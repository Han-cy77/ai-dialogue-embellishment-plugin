<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 对话润色插件</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 200px;
    }

    .container {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 18px;
      color: #333;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      color: #888;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s ease;
      outline: none;
    }

    .form-group input:focus {
      border-color: #667eea;
    }

    .form-group input::placeholder {
      color: #bbb;
    }

    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s ease;
      outline: none;
      background-color: #ffffff;
      cursor: pointer;
    }

    .form-group select:focus {
      border-color: #667eea;
    }

    .btn-save {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    .status {
      margin-top: 12px;
      text-align: center;
      font-size: 12px;
      min-height: 18px;
    }

    .status.success {
      color: #4caf50;
    }

    .status.error {
      color: #f44336;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AI 对话润色插件</h1>
      <p>请输入 SiliconFlow API Key (支持免费开源模型)</p>
    </div>
    
    <div class="form-group">
      <label for="apiKey" data-i18n="apiKeyLabel">API Key</label>
      <input type="password" id="apiKey" placeholder="请输入 SiliconFlow API Key" data-i18n-placeholder="apiKeyPlaceholder">
    </div>
    
    <div class="form-group">
      <label for="languageSelect" data-i18n="languageLabel">语言</label>
      <select id="languageSelect">
        <option value="zh-CN">中文</option>
        <option value="en-US">English</option>
      </select>
    </div>
    
    <button class="btn-save" id="saveBtn">保存</button>
    
    <div class="status" id="status"></div>
  </div>
  
  <script src="crypto.js"></script>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
